[packages]
scipy = {}
tires = {}
'git+https://github.com/luiarthur/bump-cli' = {}
arianna-ppl = {}

# NOTE: 2.4.1 does not exist. So, we expected a warning.
numpy = { versions = ["2.4.1", "1.26.4", ""], python = ["3.10", "3.13"] }

[packages.setuptools]
versions = [">=70,<73", ">79", ">81"] # can specify versions and bounds
python = ["3.12"] # can specify python version

# Can specify torch backend, like in uv
[packages.torch]
torch-backend = ["auto"]
python = ["3.12"]
